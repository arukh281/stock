# Free EOD cron: GitHub Actions → Render API (after NSE cash close).
# Uses sandbox/scripts/eod-trigger-all.sh for cold-start wake, sequential
# algos, run completion polling, and keepalive during long background jobs.
#
# Secrets (repo Settings → Secrets and variables → Actions):
#   API_URL          e.g. https://paper-sandbox-api.onrender.com
#   ANALYZE_API_KEY  same value as on paper-sandbox-api (Render → Environment)

name: EOD analyze

on:
  schedule:
    # 11:30 UTC Mon–Fri = 5:00 PM IST (after 3:30 PM close + Yahoo EOD settle)
    - cron: "30 11 * * 1-5"
  workflow_dispatch:

jobs:
  analyze:
    runs-on: ubuntu-latest
    timeout-minutes: 180
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Sequential EOD analyze (Render-safe)
        env:
          API_URL: ${{ secrets.API_URL }}
          ANALYZE_API_KEY: ${{ secrets.ANALYZE_API_KEY }}
        run: |
          set -euo pipefail
          if [[ -z "${API_URL:-}" || -z "${ANALYZE_API_KEY:-}" ]]; then
            echo "Add API_URL and ANALYZE_API_KEY in GitHub repo secrets." >&2
            exit 1
          fi
          chmod +x sandbox/scripts/eod-trigger-all.sh
          sandbox/scripts/eod-trigger-all.sh
