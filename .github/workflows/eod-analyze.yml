# Free EOD cron: GitHub Actions → Render API (after NSE cash close).
# Uses sandbox/scripts/eod-trigger-all.sh for cold-start wake, sequential
# algos, run completion polling, and keepalive during long background jobs.
# Optional Gmail summary via secrets (see sandbox/README.md).
#
# Secrets (repo Settings → Secrets and variables → Actions):
#   API_URL, ANALYZE_API_KEY — required
#   GMAIL_USER, GMAIL_APP_PASSWORD, MAIL_TO — optional email

name: EOD analyze

on:
  schedule:
    # 12:00 UTC Mon–Fri = 5:30 PM IST (Yahoo EOD settled; matches EOD_ANALYZE_AFTER_IST)
    - cron: "0 12 * * 1-5"
  workflow_dispatch:

jobs:
  analyze:
    runs-on: ubuntu-latest
    timeout-minutes: 180
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Sequential EOD analyze (Render-safe)
        id: eod
        env:
          API_URL: ${{ secrets.API_URL }}
          ANALYZE_API_KEY: ${{ secrets.ANALYZE_API_KEY }}
          EOD_SUMMARY_FILE: eod-summary.json
        run: |
          set -euo pipefail
          if [[ -z "${API_URL:-}" || -z "${ANALYZE_API_KEY:-}" ]]; then
            echo "Add API_URL and ANALYZE_API_KEY in GitHub repo secrets." >&2
            exit 1
          fi
          chmod +x sandbox/scripts/eod-trigger-all.sh
          sandbox/scripts/eod-trigger-all.sh || {
            ec=$?
            if [[ ! -f eod-summary.json ]]; then
              echo '{"runs":[],"failure_count":1,"note":"eod-trigger-all.sh exited before summary"}' > eod-summary.json
            fi
            exit $ec
          }

      - name: Send Gmail summary
        if: always()
        env:
          GMAIL_USER: ${{ secrets.GMAIL_USER }}
          GMAIL_APP_PASSWORD: ${{ secrets.GMAIL_APP_PASSWORD }}
          MAIL_TO: ${{ secrets.MAIL_TO }}
          EOD_SUMMARY_FILE: eod-summary.json
          WORKFLOW_STATUS: ${{ job.status }}
        run: python3 sandbox/scripts/eod-send-mail.py
